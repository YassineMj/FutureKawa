; PlatformIO Project Configuration File

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino


; Vitesse du moniteur serie (doit correspondre a Serial.begin(115200) dans main.cpp)
monitor_speed = 115200

; --- Bibliotheques externes (versions stables figees) ---
lib_deps =
    ; Lecture du capteur DHT22 (temperature / humidite)
    adafruit/DHT sensor library@^1.4.6
    ; Dependance requise par la lib DHT (couche capteur unifiee Adafruit)
    adafruit/Adafruit Unified Sensor@^1.1.14
    ; Client MQTT (publication + abonnement a la configuration)
    knolleary/PubSubClient@^2.8
    ; Decodage du message de configuration JSON recu par MQTT
    bblanchon/ArduinoJson@^7.0.4
    ; Pilote de l'ecran OLED SSD1306
    adafruit/Adafruit SSD1306@^2.5.9
    ; Bibliotheque graphique requise par l'ecran OLED
    adafruit/Adafruit GFX Library@^1.11.9