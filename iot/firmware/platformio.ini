; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino

; Vitesse du moniteur serie (doit correspondre a Serial.begin(115200) dans main.cpp)
monitor_speed = 115200

; --- Bibliotheques externes (versions stables figees) ---
; Le caret (^) autorise les mises a jour de correctifs compatibles.
lib_deps =
    ; Lecture du capteur DHT22 (temperature / humidite)
    adafruit/DHT sensor library@^1.4.6
    ; Dependance requise par la lib DHT (couche capteur unifiee Adafruit)
    adafruit/Adafruit Unified Sensor@^1.1.14
    ; Client MQTT (publication vers Mosquitto)
    knolleary/PubSubClient@^2.8
    ; Pilote de l'ecran OLED SSD1306
    adafruit/Adafruit SSD1306@^2.5.9
    ; Bibliotheque graphique requise par l'ecran OLED
    adafruit/Adafruit GFX Library@^1.11.9
