name: futurekawa-infra

# Infrastructure locale de développement.
# Le back-end (backend-pays) n'est PAS encore conteneurisé ici : il est lancé depuis l'IDE
# en profil "dev" et pointe sur localhost. Il sera ajouté à ce compose en Phase 5.

services:
  postgres:
    image: postgres:17
    container_name: fk-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-futurekawa}
      POSTGRES_USER: ${DB_USER:-futurekawa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-futurekawa} -d ${DB_NAME:-futurekawa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fk-mosquitto
    ports:
      - "1883:1883"   # MQTT
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  mailpit:
    image: axllent/mailpit:latest
    container_name: fk-mailpit
    ports:
      - "1025:1025"   # SMTP : le back-end envoie les emails ici
      - "8025:8025"   # Interface web : http://localhost:8025


  postgres-equateur:
    image: postgres:17
    container_name: fk-postgres-ec
    environment:
      POSTGRES_DB: futurekawa
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: changeme
    ports:
      - "5433:5432"
    volumes:
      - pgdata_ec:/var/lib/postgresql/data

  postgres-colombie:
    image: postgres:17
    container_name: fk-postgres-co
    environment:
      POSTGRES_DB: futurekawa
      POSTGRES_USER: futurekawa
      POSTGRES_PASSWORD: changeme
    ports:
      - "5434:5432"
    volumes:
      - pgdata_co:/var/lib/postgresql/data

volumes:
  pgdata:
  pgdata_ec:
  pgdata_co:
