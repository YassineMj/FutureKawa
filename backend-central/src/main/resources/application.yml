server:
  port: 8090

spring:
  application:
    name: backend-central
  datasource:
    url: ${IDENTITE_DB_URL:jdbc:postgresql://localhost:5440/identite}
    username: ${IDENTITE_DB_USER:futurekawa}
    password: ${IDENTITE_DB_PASSWORD:changeme}
    jpa:
      hibernate:
        ddl-auto: none           # le schéma est géré par Flyway
      open-in-view: false
      properties:
        hibernate:
          jdbc:
            time_zone: UTC
    flyway:
      enabled: true
      locations: classpath:db/migration

# Annuaire des back-ends pays : code -> URL de base.
# Le central interroge ces URLs via REST (pas de base de donnees ici).
app:
  pays:
    - code: BRESIL
      url: http://localhost:8080
    - code: EQUATEUR
      url: http://localhost:8081
    - code: COLOMBIE
      url: http://localhost:8082
  client:
    connect-timeout-ms: 2000   # delai max pour etablir la connexion
    read-timeout-ms: 3000      # delai max pour lire la reponse
  securite:
    jwt-secret: ${JWT_SECRET:un-secret-de-demo-tres-long-a-changer-en-production-32+caracteres}
    acces-token-minutes: 15


springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
